<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 내역</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">대여 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/reservation/my">예약 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text me-3">
                            <span th:text="${currentUser != null ? currentUser.name : ''}"></span>님
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <h2 class="mb-4">📅 내 예약 내역</h2>

        <!-- 예약 내역 테이블 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 5%">번호</th>
                                <th style="width: 30%">도서명</th>
                                <th style="width: 15%">예약일</th>
                                <th style="width: 15%">만료일</th>
                                <th style="width: 15%">완료일</th>
                                <th style="width: 10%">상태</th>
                                <th style="width: 10%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="reservation, iter : ${reservations}">
                                <td th:text="${iter.count}">1</td>
                                <td th:text="${reservation.bookTitle}">도서명</td>
                                <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 10:00</td>
                                <td>
                                    <span th:if="${reservation.expiresAt != null}" 
                                          th:text="${#temporals.format(reservation.expiresAt, 'yyyy-MM-dd HH:mm')}">2024-01-03 10:00</span>
                                    <span th:if="${reservation.expiresAt == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${reservation.completedAt != null}" 
                                          th:text="${#temporals.format(reservation.completedAt, 'yyyy-MM-dd HH:mm')}">2024-01-02 10:00</span>
                                    <span th:if="${reservation.completedAt == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${reservation.reservationStatus == 'ACTIVE'}" class="badge bg-primary">대기중</span>
                                    <span th:if="${reservation.reservationStatus == 'COMPLETED'}" class="badge bg-success">완료</span>
                                    <span th:if="${reservation.reservationStatus == 'CANCELLED'}" class="badge bg-secondary">취소</span>
                                    <span th:if="${reservation.reservationStatus == 'EXPIRED'}" class="badge bg-danger">만료</span>
                                </td>
                                <td>
                                    <form th:if="${reservation.reservationStatus == 'ACTIVE'}" 
                                          th:action="@{/reservation/{id}/cancel(id=${reservation.reservationId})}" 
                                          method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger" 
                                                onclick="return confirm('예약을 취소하시겠습니까?')">취소</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reservations)}">
                                <td colspan="7" class="text-center text-muted py-4">예약 내역이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 안내 문구 -->
        <div class="alert alert-info mt-4">
            <h6 class="alert-heading">📌 예약 안내</h6>
            <ul class="mb-0">
                <li>예약한 도서가 반납되면 3일 이내에 대여하실 수 있습니다.</li>
                <li>예약 기간이 만료되면 자동으로 취소됩니다.</li>
                <li>예약 취소는 대기중 상태에서만 가능합니다.</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
