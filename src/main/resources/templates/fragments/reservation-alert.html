<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 예약 알림 배너 -->
    <div th:fragment="alert" th:if="${readyReservations != null && !readyReservations.isEmpty()}" 
         class="alert alert-success alert-dismissible fade show sticky-top" role="alert" 
         style="z-index: 1030;">
        <div class="container">
            <strong>📚 예약하신 도서가 준비되었습니다!</strong>
            <div class="mt-2">
                <span th:each="reservation, iterStat : ${readyReservations}">
                    <a th:href="@{/book/detail/{id}(id=${reservation.bookId})}" 
                       class="alert-link fw-bold text-decoration-none" 
                       th:text="${reservation.bookTitle}">도서명</a>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </div>
            <small class="d-block mt-1">
                <i class="bi bi-clock"></i> 
                3일 이내에 대여하지 않으면 예약이 자동 취소됩니다.
            </small>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
</body>
</html>
