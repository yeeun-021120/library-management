<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 대여 내역</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/rental/my">대여 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">예약 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text me-3">
                            <span th:text="${currentUser != null ? currentUser.name : ''}"></span>님
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <h2 class="mb-4">📖 내 대여 내역</h2>

        <!-- 대여 내역 테이블 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 5%">번호</th>
                                <th style="width: 30%">도서명</th>
                                <th style="width: 15%">대여일</th>
                                <th style="width: 15%">반납예정일</th>
                                <th style="width: 15%">반납일</th>
                                <th style="width: 10%">상태</th>
                                <th style="width: 10%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rental, iter : ${rentals}">
                                <td th:text="${iter.count}">1</td>
                                <td>
                                    <a th:href="@{/book/{id}(id=${rental.bookId})}" 
                                       th:text="${rental.bookTitle}">도서명</a>
                                </td>
                                <td th:text="${#temporals.format(rental.rentalDate, 'yyyy-MM-dd')}">2024-01-01</td>
                                <td th:text="${#temporals.format(rental.dueDate, 'yyyy-MM-dd')}">2024-01-15</td>
                                <td>
                                    <span th:if="${rental.returnDate != null}" 
                                          th:text="${#temporals.format(rental.returnDate, 'yyyy-MM-dd')}">2024-01-10</span>
                                    <span th:if="${rental.returnDate == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${rental.rentalStatus == 'RENTED'}" class="badge bg-primary">대여중</span>
                                    <span th:if="${rental.rentalStatus == 'RETURNED'}" class="badge bg-success">반납완료</span>
                                    <span th:if="${rental.rentalStatus == 'OVERDUE'}" class="badge bg-danger">연체</span>
                                </td>
                                <td>
                                    <form th:if="${rental.rentalStatus == 'RENTED' or rental.rentalStatus == 'OVERDUE'}" 
                                          th:action="@{/rental/return/{id}(id=${rental.rentalId})}" 
                                          method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-success" 
                                                onclick="return confirm('반납하시겠습니까?')">반납</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rentals)}">
                                <td colspan="7" class="text-center text-muted py-4">대여 내역이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 안내 문구 -->
        <div class="alert alert-info mt-4">
            <h6 class="alert-heading">📌 대여 안내</h6>
            <ul class="mb-0">
                <li>대여 기간은 14일입니다.</li>
                <li>반납 예정일을 초과하면 연체 상태가 됩니다.</li>
                <li>연체 중에는 새로운 대여가 불가능합니다.</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
