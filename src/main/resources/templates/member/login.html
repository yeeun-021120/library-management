<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 도서관 시스템</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">📚 도서관 시스템</h2>
                    <h5 class="text-center text-muted mb-4">로그인</h5>
                    
                    <!-- 회원가입 성공 메시지 -->
                    <div th:if="${message}" class="alert alert-success" role="alert">
                        <span th:text="${message}"></span>
                    </div>
                    
                    <!-- 로그인 오류 메시지 -->
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        이메일 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    
                    <!-- 로그아웃 메시지 -->
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        로그아웃되었습니다.
                    </div>
                    
                    <!-- 로그인 폼 -->
                    <form th:action="@{/member/login}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">이메일</label>
                            <input type="email" class="form-control" id="email" 
                                   name="email" placeholder="example@email.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" 
                                   name="password" placeholder="비밀번호" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember-me">
                            <label class="form-check-label" for="remember-me">
                                로그인 상태 유지
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            로그인
                        </button>
                        
                        <div class="text-center">
                            <a href="/member/signup" class="text-decoration-none">
                                회원가입
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
            <p class="text-center text-white mt-3">
                <small>&copy; 2026 Library Management System</small>
            </p>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
