<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 북플랫폼</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">📚 북플랫폼 회원가입</h2>
                        
                        <!-- 에러 메시지 -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <span th:text="${error}"></span>
                        </div>
                        
                        <form th:action="@{/member/signup}" method="post">
                            <!-- 이메일 -->
                            <div class="mb-3">
                                <label for="email" class="form-label">이메일</label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       placeholder="example@email.com" required>
                            </div>
                            
                            <!-- 비밀번호 -->
                            <div class="mb-3">
                                <label for="password" class="form-label">비밀번호</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="8자 이상" minlength="8" required>
                            </div>
                            
                            <!-- 이름 -->
                            <div class="mb-3">
                                <label for="name" class="form-label">이름</label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       placeholder="홍길동" required>
                            </div>
                            
                            <!-- 전화번호 -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">전화번호</label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" required>
                                <div class="form-text">형식: 010-1234-5678</div>
                            </div>
                            
                            <!-- 선호 수령 장소 ⭐ NEW -->
                            <div class="mb-3">
                                <label for="preferredLocation" class="form-label">선호 수령 장소</label>
                                <select class="form-select" id="preferredLocation" name="preferredLocation" required>
                                    <option value="">선택해주세요</option>
                                    <option value="강남점">강남점 (강남역 2번 출구)</option>
                                    <option value="홍대점">홍대점 (홍대입구역 9번 출구)</option>
                                    <option value="신촌점">신촌점 (신촌역 3번 출구)</option>
                                    <option value="판교점">판교점 (판교역 1번 출구)</option>
                                    <option value="분당점">분당점 (서현역 4번 출구)</option>
                                    <option value="잠실점">잠실점 (잠실역 2번 출구)</option>
                                </select>
                                <div class="form-text">
                                    💡 무인 수령함이 설치된 장소입니다. 대여/반납 시 방문하게 됩니다.
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">회원가입</button>
                                <a href="/member/login" class="btn btn-outline-secondary">로그인으로 돌아가기</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- 서비스 안내 -->
                <div class="card mt-3 bg-info bg-opacity-10 border-0">
                    <div class="card-body">
                        <h6 class="fw-bold">📍 무인 도서 수령함이란?</h6>
                        <small>
                            온라인으로 대여 신청하면 선택한 무인함에 도서가 준비됩니다.<br>
                            24시간 언제든지 수령/반납 가능합니다!
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
