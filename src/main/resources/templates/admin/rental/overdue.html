<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연체 목록 - 도서관 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/book/list">📚 북플랫폼</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/guide/how-to-use">이용 안내</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">내 대여 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">내 예약 목록</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/dashboard">관리자</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="name"></span>님
                        </span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/member/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 예약 알림 -->
    <div th:replace="~{fragments/reservation-alert :: alert}"></div>

    <!-- 메인 컨텐츠 -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-danger">⚠️ 연체 목록</h2>
            <div>
                <a href="/admin/rental/list" class="btn btn-outline-secondary me-2">
                    ← 대여 목록
                </a>
                <a href="/admin/dashboard" class="btn btn-outline-secondary">
                    대시보드
                </a>
            </div>
        </div>

        <!-- 경고 메시지 -->
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <strong>연체된 대여</strong> - 반납 예정일이 지난 대여 목록입니다.
        </div>

        <!-- 연체 목록 -->
        <div class="card">
            <div class="card-header bg-danger text-white">
                <strong>연체 목록</strong>
                <span class="badge bg-light text-danger ms-2" th:text="${#lists.size(rentals)} + '건'"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>회원</th>
                                <th>도서</th>
                                <th>대여일</th>
                                <th>반납 예정일</th>
                                <th>연체 일수</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(rentals)}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    연체된 대여가 없습니다
                                </td>
                            </tr>
                            <tr th:each="rental : ${rentals}">
                                <td>
                                    <strong th:text="${rental.userName}">홍길동</strong>
                                </td>
                                <td th:text="${rental.bookTitle}">해리포터</td>
                                <td th:text="${#temporals.format(rental.rentalDate, 'yyyy-MM-dd')}">2024-01-01</td>
                                <td th:text="${#temporals.format(rental.dueDate, 'yyyy-MM-dd')}">2024-01-15</td>
                                <td>
                                    <span class="badge bg-danger" 
                                          th:text="${rental.overdueDays} + '일'">5일</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/rental/return/{id}(id=${rental.rentalId})}" 
                                          method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('반납 처리하시겠습니까?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-success">
                                            반납 처리
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
