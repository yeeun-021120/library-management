<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대여 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">📖 대여 관리</h2>

        <!-- 검색 및 필터 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/rental/list}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label for="status" class="form-label">상태</label>
                        <select class="form-select" id="status" name="status">
                            <option value="">전체</option>
                            <option value="rented" th:selected="${status == 'rented'}">대여 중</option>
                            <option value="returned" th:selected="${status == 'returned'}">반납 완료</option>
                            <option value="overdue" th:selected="${status == 'overdue'}">연체</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="회원명, 도서명">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 대여 목록 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">대여 목록 (총 <span th:text="${#lists.size(rentals)}">0</span>건)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 8%">ID</th>
                                <th style="width: 12%">회원명</th>
                                <th style="width: 20%">도서명</th>
                                <th style="width: 12%">대여일</th>
                                <th style="width: 12%">반납 예정일</th>
                                <th style="width: 12%">반납일</th>
                                <th style="width: 10%">상태</th>
                                <th style="width: 8%">연체일</th>
                                <th style="width: 6%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rental : ${rentals}">
                                <td th:text="${rental.rentalId}">1</td>
                                <td th:text="${rental.userName}">회원명</td>
                                <td th:text="${rental.bookTitle}">도서명</td>
                                <td th:text="${rental.rentalDate != null ? #temporals.format(rental.rentalDate, 'yyyy-MM-dd') : '-'}">2024-01-01</td>
                                <td th:text="${rental.dueDate != null ? #temporals.format(rental.dueDate, 'yyyy-MM-dd') : '-'}">2024-01-08</td>
                                <td th:text="${rental.returnDate != null ? #temporals.format(rental.returnDate, 'yyyy-MM-dd') : '-'}">-</td>
                                <td>
                                    <span th:if="${rental.returnDate != null}" class="badge bg-secondary">반납 완료</span>
                                    <span th:if="${rental.returnDate == null and rental.rentalDate != null and rental.overdueDays == 0}" 
                                          class="badge bg-success">대여 중</span>
                                    <span th:if="${rental.returnDate == null and rental.overdueDays > 0}" 
                                          class="badge bg-danger">연체</span>
                                </td>
                                <td>
                                    <span th:if="${rental.overdueDays != null and rental.overdueDays > 0}" 
                                          class="text-danger fw-bold" 
                                          th:text="${rental.overdueDays + '일'}">0일</span>
                                    <span th:if="${rental.overdueDays == null or rental.overdueDays == 0}">-</span>
                                </td>
                                <td>
                                    <form th:if="${rental.returnDate == null and rental.rentalDate != null}" 
                                          th:action="@{/admin/rental/{id}/return(id=${rental.rentalId})}" 
                                          method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-primary">반납</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rentals)}">
                                <td colspan="9" class="text-center text-muted py-4">대여 내역이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
