<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 무인 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">👤 회원 관리</h2>

        <!-- 검색 및 필터 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/user/list}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="이름, 이메일">
                    </div>
                    <div class="col-md-3">
                        <label for="status" class="form-label">상태</label>
                        <select class="form-select" id="status" name="status">
                            <option value="">전체</option>
                            <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">정상</option>
                            <option value="SUSPENDED" th:selected="${status == 'SUSPENDED'}">정지</option>
                            <option value="WITHDRAWN" th:selected="${status == 'WITHDRAWN'}">탈퇴</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="role" class="form-label">권한</label>
                        <select class="form-select" id="role" name="role">
                            <option value="">전체</option>
                            <option value="ADMIN" th:selected="${role == 'ADMIN'}">관리자</option>
                            <option value="USER" th:selected="${role == 'USER'}">사용자</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 회원 목록 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">회원 목록 (총 <span th:text="${#lists.size(users)}">0</span>명)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 5%">ID</th>
                                <th style="width: 10%">이름</th>
                                <th style="width: 20%">이메일</th>
                                <th style="width: 12%">전화번호</th>
                                <th style="width: 8%">권한</th>
                                <th style="width: 10%">가입일</th>
                                <th style="width: 8%">상태</th>
                                <th style="width: 10%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}">1</td>
                                <td th:text="${user.name}">홍길동</td>
                                <td th:text="${user.email}">test@test.com</td>
                                <td th:text="${user.phone}">010-1234-5678</td>
                                <td>
                                    <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">관리자</span>
                                    <span th:if="${user.role == 'USER'}" class="badge bg-primary">사용자</span>
                                </td>
                                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">2024-01-01</td>
                                <td>
                                    <span th:if="${user.status == 'ACTIVE'}" class="badge bg-success">정상</span>
                                    <span th:if="${user.status == 'SUSPENDED'}" class="badge bg-warning">정지</span>
                                    <span th:if="${user.status == 'WITHDRAWN'}" class="badge bg-secondary">탈퇴</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/user/{id}(id=${user.userId})}" class="btn btn-sm btn-outline-primary">상세</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="8" class="text-center text-muted py-4">회원이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
