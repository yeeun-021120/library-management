<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 상세 정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 무인 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4>👤 회원 상세 정보</h4>
                        <a href="/admin/user/list" class="btn btn-secondary btn-sm">목록으로</a>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered">
                            <tr>
                                <th style="width: 30%">ID</th>
                                <td th:text="${user.userId}">1</td>
                            </tr>
                            <tr>
                                <th>이름</th>
                                <td th:text="${user.name}">홍길동</td>
                            </tr>
                            <tr>
                                <th>이메일</th>
                                <td th:text="${user.email}">test@test.com</td>
                            </tr>
                            <tr>
                                <th>전화번호</th>
                                <td th:text="${user.phone}">010-1234-5678</td>
                            </tr>
                            <tr>
                                <th>권한</th>
                                <td>
                                    <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">관리자</span>
                                    <span th:if="${user.role == 'USER'}" class="badge bg-primary">사용자</span>
                                </td>
                            </tr>
                            <tr>
                                <th>상태</th>
                                <td>
                                    <span th:if="${user.status == 'ACTIVE'}" class="badge bg-success">정상</span>
                                    <span th:if="${user.status == 'SUSPENDED'}" class="badge bg-warning">정지</span>
                                    <span th:if="${user.status == 'WITHDRAWN'}" class="badge bg-secondary">탈퇴</span>
                                </td>
                            </tr>
                            <tr th:if="${user.restrictUntil != null}">
                                <th>정지 종료일</th>
                                <td th:text="${#temporals.format(user.restrictUntil, 'yyyy-MM-dd')}">2024-12-31</td>
                            </tr>
                            <tr>
                                <th>선호 장소</th>
                                <td th:text="${user.preferredLocation ?: '-'}">-</td>
                            </tr>
                            <tr>
                                <th>가입일</th>
                                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                            </tr>
                        </table>

                        <!-- 관리 기능 -->
                        <div class="mt-4" th:if="${user.status == 'ACTIVE'}">
                            <h5>회원 관리</h5>
                            <div class="d-flex gap-2">
                                <!-- 정지 버튼 -->
                                <button type="button" class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#suspendModal">
                                    🚫 정지
                                </button>
                                <!-- 탈퇴 처리 버튼 -->
                                <form th:action="@{/admin/user/{id}/withdraw(id=${user.userId})}" method="post" style="display:inline;"
                                      onsubmit="return confirm('정말 이 회원을 탈퇴 처리하시겠습니까?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-danger">❌ 탈퇴 처리</button>
                                </form>
                            </div>
                        </div>

                        <!-- 정지 해제 -->
                        <div class="mt-4" th:if="${user.status == 'SUSPENDED'}">
                            <form th:action="@{/admin/user/{id}/activate(id=${user.userId})}" method="post"
                                  onsubmit="return confirm('정지를 해제하시겠습니까?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-success">✅ 정지 해제</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 정지 모달 -->
    <div class="modal fade" id="suspendModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">회원 정지</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/user/{id}/suspend(id=${user.userId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="restrictUntil" class="form-label">정지 종료일 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="restrictUntil" name="restrictUntil" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-warning">정지</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
