<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.bookId != null ? '도서 수정' : '도서 등록'}">도서 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${book.bookId != null ? '도서 수정' : '도서 등록'}">도서 등록</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${book.bookId != null ? '/admin/book/' + book.bookId + '/edit' : '/admin/book/new'}" 
                              method="post" enctype="multipart/form-data">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            
                            <div class="row">
                                <!-- 왼쪽: 표지 이미지 -->
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label class="form-label">표지 이미지</label>
                                        <div class="text-center">
                                            <img id="coverPreview" 
                                                 th:src="${book.coverImage != null ? book.coverImage : '/images/books/default-cover.jpg'}" 
                                                 alt="책 표지" 
                                                 class="img-thumbnail mb-3" 
                                                 style="width: 100%; max-width: 300px; height: auto;">
                                            <input type="file" 
                                                   class="form-control" 
                                                   id="coverImageFile" 
                                                   name="coverImageFile" 
                                                   accept="image/*"
                                                   onchange="previewImage(event)">
                                            <small class="text-muted">JPG, PNG 형식 (최대 5MB)</small>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- 오른쪽: 도서 정보 -->
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label for="title" class="form-label">도서명 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="title" name="title" 
                                               th:value="${book.title}" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="author" class="form-label">저자 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="author" name="author" 
                                               th:value="${book.author}" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="publisher" class="form-label">출판사 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="publisher" name="publisher" 
                                               th:value="${book.publisher}" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="isbn" class="form-label">ISBN</label>
                                        <input type="text" class="form-control" id="isbn" name="isbn" 
                                               th:value="${book.isbn}">
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="categoryId" class="form-label">카테고리 <span class="text-danger">*</span></label>
                                        <select class="form-select" id="categoryId" name="categoryId" required>
                                            <option value="">선택하세요</option>
                                            <option th:each="category : ${categories}" 
                                                    th:value="${category.categoryId}" 
                                                    th:text="${category.categoryName}"
                                                    th:selected="${book.categoryId == category.categoryId}">
                                            </option>
                                        </select>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="publishDate" class="form-label">출판일</label>
                                        <input type="date" class="form-control" id="publishDate" name="publishDate" 
                                               th:value="${book.publishDate}">
                                    </div>
                                    
                                    <div class="mb-3" th:if="${book.bookId == null}">
                                        <label for="quantity" class="form-label">보유 수량 <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="quantity" name="quantity" 
                                               min="1" value="1" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">설명</label>
                                <textarea class="form-control" id="description" name="description" 
                                          rows="4" th:text="${book.description}"></textarea>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="/admin/book/list" class="btn btn-secondary">취소</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:text="${book.bookId != null ? '수정' : '등록'}">등록</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 이미지 미리보기
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('coverPreview').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
