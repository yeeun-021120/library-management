<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📚 도서 관리</h2>
            <div>
                <a href="/admin/book/new" class="btn btn-success">+ 도서 등록</a>
            </div>
        </div>

        <!-- 검색 폼 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/book/list}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="도서명, 저자, ISBN">
                    </div>
                    <div class="col-md-3">
                        <label for="categoryId" class="form-label">카테고리</label>
                        <select class="form-select" id="categoryId" name="categoryId">
                            <option value="">전체</option>
                            <option th:each="category : ${categories}" 
                                    th:value="${category.categoryId}" 
                                    th:text="${category.categoryName}"
                                    th:selected="${categoryId != null and categoryId == category.categoryId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="availability" class="form-label">대여 가능 여부</label>
                        <select class="form-select" id="availability" name="availability">
                            <option value="">전체</option>
                            <option value="available" th:selected="${availability == 'available'}">대여 가능</option>
                            <option value="unavailable" th:selected="${availability == 'unavailable'}">대여 불가</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 도서 목록 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">도서 목록 (총 <span th:text="${#lists.size(books)}">0</span>권)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 8%">ID</th>
                                <th style="width: 25%">도서명</th>
                                <th style="width: 15%">저자</th>
                                <th style="width: 12%">출판사</th>
                                <th style="width: 12%">카테고리</th>
                                <th style="width: 10%">총 보유</th>
                                <th style="width: 10%">대여 가능</th>
                                <th style="width: 8%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${books}">
                                <td th:text="${book.bookId}">1</td>
                                <td th:text="${book.title}">도서명</td>
                                <td th:text="${book.author}">저자</td>
                                <td th:text="${book.publisher}">출판사</td>
                                <td><span class="badge bg-info" th:text="${book.categoryName}">카테고리</span></td>
                                <td th:text="${book.totalCopies}">0</td>
                                <td>
                                    <span class="text-success fw-bold" th:text="${book.availableCopies}">0</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/admin/book/{id}/edit(id=${book.bookId})}" 
                                           class="btn btn-outline-primary">수정</a>
                                        <form th:action="@{/admin/book/{id}/delete(id=${book.bookId})}" 
                                              method="post" style="display:inline;"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(books)}">
                                <td colspan="8" class="text-center text-muted py-4">도서가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
