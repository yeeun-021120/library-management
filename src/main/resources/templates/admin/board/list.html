<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 로그아웃 폼 (숨김) -->
    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📋 게시판 관리</h2>
            <div>
                <a href="/admin/board/notice/new" class="btn btn-success">+ 공지사항 작성</a>
            </div>
        </div>

        <!-- 검색 및 필터 -->
        <div class="card mb-4">
            <div class="card-body">
                <form action="/admin/board/list" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label for="category" class="form-label">카테고리</label>
                        <select class="form-select" id="category" name="category">
                            <option value="">전체</option>
                            <option value="NOTICE" th:selected="${category == 'NOTICE'}">공지사항</option>
                            <option value="FREE" th:selected="${category == 'FREE'}">자유게시판</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="제목 또는 내용">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 게시글 목록 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">게시글 목록 (총 <span th:text="${#lists.size(boards)}">0</span>개)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 8%">번호</th>
                                <th style="width: 10%">카테고리</th>
                                <th style="width: 40%">제목</th>
                                <th style="width: 12%">작성자</th>
                                <th style="width: 15%">작성일</th>
                                <th style="width: 8%">조회</th>
                                <th style="width: 7%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="board : ${boards}">
                                <td>
                                    <span th:if="${board.isPinned}" class="badge bg-danger">고정</span>
                                    <span th:unless="${board.isPinned}" th:text="${board.boardId}">1</span>
                                </td>
                                <td>
                                    <span th:if="${board.category == 'NOTICE'}" class="badge bg-warning text-dark">공지</span>
                                    <span th:if="${board.category == 'FREE'}" class="badge bg-info">자유</span>
                                </td>
                                <td>
                                    <a th:href="@{/board/{id}(id=${board.boardId})}" 
                                       class="text-decoration-none" target="_blank">
                                        <span th:text="${board.title}">제목</span>
                                        <span class="badge bg-secondary ms-1" 
                                              th:if="${board.commentCount > 0}" 
                                              th:text="'[' + ${board.commentCount} + ']'"></span>
                                    </a>
                                </td>
                                <td th:text="${board.userName}">작성자</td>
                                <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                <td th:text="${board.views}">0</td>
                                <td>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <form th:if="${board.category == 'NOTICE'}" 
                                              th:action="@{/admin/board/{id}/toggle-pin(id=${board.boardId})}" 
                                              method="post" style="display:inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline-warning" 
                                                    th:title="${board.isPinned ? '고정 해제' : '상단 고정'}">
                                                📌
                                            </button>
                                        </form>
                                        <a th:href="@{/admin/board/{id}/edit(id=${board.boardId})}" 
                                           class="btn btn-outline-primary btn-sm">수정</a>
                                        <form th:action="@{/admin/board/{id}/delete(id=${board.boardId})}" 
                                              method="post" style="display:inline;"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(boards)}">
                                <td colspan="7" class="text-center text-muted py-4">게시글이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
