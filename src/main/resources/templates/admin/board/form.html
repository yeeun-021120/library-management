<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.boardId != null ? '게시글 수정' : '공지사항 작성'}">공지사항 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 로그아웃 폼 (숨김) -->
    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0" th:text="${board.boardId != null ? '게시글 수정' : '공지사항 작성'}">공지사항 작성</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${board.boardId != null ? '/admin/board/' + board.boardId + '/edit' : '/admin/board/notice/new'}" 
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            
                            <div class="mb-3">
                                <label for="title" class="form-label">제목 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="title" name="title" 
                                       th:value="${board.title}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="content" class="form-label">내용 <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="content" name="content" 
                                          rows="15" required th:text="${board.content}"></textarea>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="isPinned" 
                                       name="isPinned" value="true"
                                       th:checked="${board.isPinned}">
                                <label class="form-check-label" for="isPinned">
                                    📌 상단 고정
                                </label>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="/admin/board/list" class="btn btn-secondary">취소</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:text="${board.boardId != null ? '수정하기' : '작성하기'}">작성하기</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
