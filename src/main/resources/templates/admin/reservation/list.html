<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">📚 무인 도서관 관리</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/book/list">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/user/list">회원 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/rental/list">대여 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/reservation/list">예약 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/board/list">게시판 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics/dashboard">통계</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">사용자 페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">📌 예약 관리</h2>

        <!-- 통계 카드 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">활성 예약</h5>
                        <h2 th:text="${activeCount}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">완료된 예약</h5>
                        <h2 th:text="${completedCount}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title">취소된 예약</h5>
                        <h2 th:text="${cancelledCount}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-danger">
                    <div class="card-body">
                        <h5 class="card-title">만료된 예약</h5>
                        <h2 th:text="${expiredCount}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- 검색 폼 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/reservation/list}" method="get" class="row g-3">
                    <div class="col-md-10">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="회원명, 도서명">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 예약 목록 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">예약 목록 (총 <span th:text="${#lists.size(reservations)}">0</span>건)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 8%">ID</th>
                                <th style="width: 12%">회원명</th>
                                <th style="width: 25%">도서명</th>
                                <th style="width: 12%">예약일</th>
                                <th style="width: 10%">상태</th>
                                <th style="width: 13%">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="reservation : ${reservations}">
                                <td th:text="${reservation.reservationId}">1</td>
                                <td th:text="${reservation.userName}">회원명</td>
                                <td th:text="${reservation.bookTitle}">도서명</td>
                                <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                <td>
                                    <span th:if="${reservation.reservationStatus == 'ACTIVE'}" class="badge bg-primary">활성</span>
                                    <span th:if="${reservation.reservationStatus == 'COMPLETED'}" class="badge bg-success">완료</span>
                                    <span th:if="${reservation.reservationStatus == 'CANCELLED'}" class="badge bg-secondary">취소</span>
                                    <span th:if="${reservation.reservationStatus == 'EXPIRED'}" class="badge bg-danger">만료</span>
                                </td>
                                <td>
                                    <form th:if="${reservation.reservationStatus == 'ACTIVE'}" 
                                          th:action="@{/admin/reservation/{id}/cancel(id=${reservation.reservationId})}" 
                                          method="post" style="display:inline;"
                                          onsubmit="return confirm('예약을 취소하시겠습니까?');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-danger">취소</button>
                                    </form>
                                    <span th:if="${reservation.reservationStatus != 'ACTIVE'}" class="text-muted">-</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reservations)}">
                                <td colspan="6" class="text-center text-muted py-4">예약 내역이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
