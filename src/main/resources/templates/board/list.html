<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category == 'NOTICE' ? '공지사항' : '자유게시판'}">게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">내 대여 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">내 예약 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">공지사항</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/free">자유게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 로그아웃 폼 (숨김) -->
    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <span th:if="${category == 'NOTICE'}">📢 공지사항</span>
                <span th:if="${category == 'FREE'}">💬 자유게시판</span>
            </h2>
            <div>
                <a th:if="${category == 'FREE'}" href="/board/new" class="btn btn-primary">+ 글쓰기</a>
            </div>
        </div>

        <!-- 검색 폼 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="${category == 'NOTICE' ? '/board/notice' : '/board/free'}" method="get" class="row g-3">
                    <div class="col-md-10">
                        <input type="text" class="form-control" name="keyword" 
                               th:value="${keyword}" placeholder="제목 또는 내용 검색">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 게시글 목록 -->
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th style="width: 10%">번호</th>
                            <th style="width: 50%">제목</th>
                            <th style="width: 15%">작성자</th>
                            <th style="width: 15%">작성일</th>
                            <th style="width: 10%">조회</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="board : ${boards}">
                            <td>
                                <span th:if="${board.isPinned}" class="badge bg-danger">공지</span>
                                <span th:unless="${board.isPinned}" th:text="${board.boardId}">1</span>
                            </td>
                            <td>
                                <a th:href="@{/board/{id}(id=${board.boardId})}" class="text-decoration-none">
                                    <span th:if="${board.isPinned}" class="fw-bold" th:text="${board.title}">제목</span>
                                    <span th:unless="${board.isPinned}" th:text="${board.title}">제목</span>
                                    <span class="badge bg-secondary ms-1" th:if="${board.commentCount > 0}" 
                                          th:text="'[' + ${board.commentCount} + ']'"></span>
                                </a>
                            </td>
                            <td th:text="${board.userName}">작성자</td>
                            <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                            <td th:text="${board.views}">0</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(boards)}">
                            <td colspan="5" class="text-center text-muted py-4">게시글이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
