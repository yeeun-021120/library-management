<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">내 대여 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">내 예약 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">공지사항</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/free">자유게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 로그아웃 폼 (숨김) -->
    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <!-- 게시글 -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">
                        <span th:if="${board.isPinned}" class="badge bg-danger me-2">공지</span>
                        <span th:text="${board.title}">제목</span>
                    </h4>
                </div>
                <div class="text-muted mt-2">
                    <small>
                        작성자: <strong th:text="${board.userName}">작성자</strong> | 
                        작성일: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span> | 
                        조회: <span th:text="${board.views}">0</span>
                    </small>
                </div>
            </div>
            <div class="card-body">
                <div th:utext="${#strings.replace(board.content, T(java.lang.System).lineSeparator(), '<br/>')}" 
                     style="min-height: 200px; white-space: pre-wrap;">
                    내용
                </div>
            </div>
            <div class="card-footer bg-light">
                <div class="d-flex justify-content-between">
                    <div>
                        <a th:href="${board.category == 'NOTICE' ? '/board/notice' : '/board/free'}" 
                           class="btn btn-secondary">← 목록으로</a>
                    </div>
                    <div th:if="${currentUser != null && currentUser.userId == board.userId}">
                        <a th:href="@{/board/{id}/edit(id=${board.boardId})}" 
                           class="btn btn-warning">수정</a>
                        <form th:action="@{/board/{id}/delete(id=${board.boardId})}" 
                              method="post" style="display:inline;"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 댓글 목록 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">💬 댓글 <span class="badge bg-secondary" th:text="${#lists.size(comments)}">0</span></h5>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted py-4">
                    첫 댓글을 작성해보세요!
                </div>
                
                <div th:each="comment : ${comments}" class="border-bottom pb-3 mb-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <strong th:text="${comment.userName}">작성자</strong>
                            <small class="text-muted ms-2" 
                                   th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</small>
                            <p class="mb-0 mt-2" th:text="${comment.content}">댓글 내용</p>
                        </div>
                        <div th:if="${currentUser != null && currentUser.userId == comment.userId}">
                            <form th:action="@{/board/{boardId}/comment/{commentId}/delete(boardId=${board.boardId},commentId=${comment.commentId})}" 
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 댓글 작성 폼 -->
        <div class="card" th:if="${currentUser != null}">
            <div class="card-header">
                <h5 class="mb-0">댓글 작성</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/board/{id}/comment(id=${board.boardId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <textarea class="form-control" name="content" rows="3" 
                                  placeholder="댓글을 입력하세요" required></textarea>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">댓글 작성</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
