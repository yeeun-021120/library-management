<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .book-card {
            transition: transform 0.2s;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .book-cover {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">내 대여 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">내 예약 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">공지사항</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/free">자유게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/dashboard">관리자</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <h2 class="mb-4">📚 도서 목록</h2>

        <!-- 검색 폼 -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/book/list}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label for="keyword" class="form-label">검색어</label>
                        <input type="text" class="form-control" id="keyword" name="keyword" 
                               th:value="${keyword}" placeholder="도서명, 저자">
                    </div>
                    <div class="col-md-3">
                        <label for="categoryId" class="form-label">카테고리</label>
                        <select class="form-select" id="categoryId" name="categoryId">
                            <option value="">전체</option>
                            <option th:each="category : ${categories}" 
                                    th:value="${category.categoryId}" 
                                    th:text="${category.categoryName}"
                                    th:selected="${categoryId != null and categoryId == category.categoryId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="availability" class="form-label">대여 가능 여부</label>
                        <select class="form-select" id="availability" name="availability">
                            <option value="">전체</option>
                            <option value="available" th:selected="${availability == 'available'}">대여 가능</option>
                            <option value="unavailable" th:selected="${availability == 'unavailable'}">대여 불가</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">🔍 검색</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 도서 목록 (카드 형식 + 표지 이미지) -->
        <div class="row">
            <div class="col-md-3 mb-4" th:each="book : ${books}">
                <div class="card h-100 book-card">
                    <!-- 책 표지 이미지 -->
                    <img th:src="${book.coverImage != null ? book.coverImage : '/images/books/default-cover.jpg'}" 
                         class="card-img-top book-cover" 
                         th:alt="${book.title}">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${book.title}">도서명</h5>
                        <p class="card-text">
                            <small class="text-muted">
                                <strong>저자:</strong> <span th:text="${book.author}">저자</span><br>
                                <strong>출판사:</strong> <span th:text="${book.publisher}">출판사</span>
                            </small>
                        </p>
                        <div class="mt-auto">
                            <span class="badge bg-info mb-2" th:text="${book.categoryName}">카테고리</span><br>
                            <strong>대여 가능:</strong> 
                            <span class="text-success fw-bold" th:text="${book.availableCopies}">0</span> / 
                            <span th:text="${book.totalCopies}">0</span>
                        </div>
                        <a th:href="@{/book/{id}(id=${book.bookId})}" 
                           class="btn btn-primary mt-3">상세 보기</a>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(books)}" class="col-12">
                <div class="alert alert-info text-center">검색 결과가 없습니다.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
