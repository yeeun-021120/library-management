<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/book/list">📚 무인 도서관</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/book/list">도서 목록</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rental/my">대여 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reservation/my">예약 내역</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/notice">게시판</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text me-3">
                            <span th:text="${currentUser != null ? currentUser.name : ''}"></span>님
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">로그아웃</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="container mt-4">
        <div class="row">
            <!-- 도서 이미지 -->
            <div class="col-md-4">
                <img th:if="${book.coverImage != null}" 
                     th:src="@{${book.coverImage}}" 
                     class="img-fluid rounded shadow" 
                     alt="Book Cover">
                <img th:if="${book.coverImage == null}" 
                     src="https://via.placeholder.com/300x400?text=No+Image" 
                     class="img-fluid rounded shadow" 
                     alt="No Cover">
            </div>

            <!-- 도서 정보 -->
            <div class="col-md-8">
                <h2 th:text="${book.title}">도서명</h2>
                
                <table class="table table-bordered mt-3">
                    <tbody>
                        <tr>
                            <th style="width: 20%">저자</th>
                            <td th:text="${book.author}">저자</td>
                        </tr>
                        <tr>
                            <th>출판사</th>
                            <td th:text="${book.publisher}">출판사</td>
                        </tr>
                        <tr>
                            <th>ISBN</th>
                            <td th:text="${book.isbn}">ISBN</td>
                        </tr>
                        <tr>
                            <th>카테고리</th>
                            <td>
                                <span class="badge bg-info" th:text="${book.categoryName}">카테고리</span>
                            </td>
                        </tr>
                        <tr>
                            <th>출판일</th>
                            <td th:text="${#temporals.format(book.publishDate, 'yyyy-MM-dd')}">2024-01-01</td>
                        </tr>
                        <tr>
                            <th>대여 가능</th>
                            <td>
                                <span th:text="${book.availableCopies} + ' / ' + ${book.totalCopies}">3 / 3</span>
                                <span th:if="${book.availableCopies > 0}" class="badge bg-success ms-2">대여 가능</span>
                                <span th:if="${book.availableCopies == 0}" class="badge bg-danger ms-2">대여 불가</span>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- 설명 -->
                <div class="mt-3">
                    <h5>설명</h5>
                    <p th:text="${book.description}">도서 설명</p>
                </div>

                <!-- 버튼 영역 -->
                <div class="mt-4">
                    <a href="/book/list" class="btn btn-secondary">← 목록으로</a>
                    
                    <!-- 🟢 재고 있음: 대여하기 버튼 -->
                    <form th:if="${book.availableCopies > 0}" 
                          th:action="@{/rental/rent/{id}(id=${book.bookId})}" 
                          method="post" 
                          style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary">
                            📚 대여하기
                        </button>
                    </form>
                    
                    <!-- 🔴 재고 없음: 예약하기 버튼 -->
                    <form th:if="${book.availableCopies == 0}" 
                          th:action="@{/reservation/reserve/{id}(id=${book.bookId})}" 
                          method="post" 
                          style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-warning">
                            ⏰ 예약하기
                        </button>
                    </form>
                </div>

                <!-- 안내 메시지 -->
                <div th:if="${book.availableCopies == 0}" class="alert alert-info mt-3">
                    <strong>📌 예약 안내</strong>
                    <ul class="mb-0 mt-2">
                        <li>현재 대여 가능한 도서가 없습니다.</li>
                        <li>예약하시면 반납 시 우선적으로 대여하실 수 있습니다.</li>
                        <li>예약 후 3일 이내에 대여하지 않으면 자동 취소됩니다.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
