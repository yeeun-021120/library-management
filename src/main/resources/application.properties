# ============================================
# 서버 설정
# ============================================
server.port=9090
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================
# Database 설정
# ============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=library_user
spring.datasource.password=library_password

# HikariCP 설정
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# MyBatis 설정
# ============================================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.library.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# MyBatis 로그 (개발 중)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ============================================
# Thymeleaf 설정
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ============================================
# Logging 설정
# ============================================
logging.level.root=INFO
logging.level.com.library=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.mybatis=DEBUG

# ============================================
# DevTools 설정
# ============================================
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# 파일 업로드 설정
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# 정적 리소스 경로 설정
spring.web.resources.static-locations=classpath:/static/